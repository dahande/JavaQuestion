<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>JavaLearn</title>
    <!-- GitHub Pages SPA フォールバック: 直接アクセスされた未生成パスをアプリへ転送 -->
    <script>
      (function () {
        var segmentsToKeep = 1; // プロジェクトページ /JavaQuestion/
        var l = window.location;
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') +
            '/?/' +
            l.pathname.slice(1).split('/').slice(segmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
